# =============================================================================
# SIN-Obras — Docker Compose (Produção)
# =============================================================================
# Use como override: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Ou ajuste as variáveis no .env para apontar para produção.
# =============================================================================

services:
  backend:
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - DEBUG=false
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-["https://sinobras.rn.gov.br"]}
    volumes: []

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # VITE_API_URL é baked-in no bundle em build-time pelo Vite.
        # Defina no .env ou na variável de ambiente antes de rodar o build.
        - VITE_API_URL=${VITE_API_URL:-https://api.sinobras.rn.gov.br/api}
    # nginx serve os arquivos estáticos buildados (sem Node.js em runtime)
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "80:80"
    restart: unless-stopped
    volumes: []

  postgres:
    restart: unless-stopped

  minio:
    restart: unless-stopped

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["alembic/"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = ["E501", "B008", "E712", "UP038", "B904"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

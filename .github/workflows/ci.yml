name: CI

# CI automático desativado para não usar o GitHub Actions pago (conta sem plano).
# A validação é feita LOCALMENTE: `make validate` (ou o hook .githooks/pre-push).
# Mantemos o workflow apenas como manual (workflow_dispatch). Para reativar o CI
# automático, restaure os gatilhos push/pull_request e siga Docs/ci-local.md +
# Docs/branch-protection.md (tornar os checks obrigatórios de novo).
on:
  workflow_dispatch:

jobs:
  frontend-lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build

  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: sinobras
          POSTGRES_PASSWORD: sinobras_dev_2026
          POSTGRES_DB: sinobras_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://sinobras:sinobras_dev_2026@localhost:5432/sinobras_test
          TEST_DATABASE_URL: postgresql+asyncpg://sinobras:sinobras_dev_2026@localhost:5432/sinobras_test
          TEST_SYNC_URL: postgresql://sinobras:sinobras_dev_2026@localhost:5432/sinobras_test
        run: |
          cd backend
          PYTHONPATH=. pytest tests/ -v --cov=app --cov-report=term-missing
